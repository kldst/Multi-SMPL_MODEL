# Training config for the new platform where data lives under /dataset:
#   /dataset/Mamma_mv_split/{train,test}     (multi-view split)
#   /dataset/body_models/...                 (SMPL-X models + downsampled verts)
#   /dataset/model.pt                        (VGGT-1B pretrained weights)
# Same as mamma_smplx.yaml but with /dataset paths; inherits default_smplx.yaml.
#
#   cd training
#   torchrun --master_port=29200 --nproc_per_node=1 launch.py --config mamma_smplx_dataset
defaults:
  - default_smplx.yaml

exp_name: mamma_smplx_mv34_meanpose_ief3
img_size: 518
patch_size: 14
num_workers: 0
max_img_per_gpu: 40            # 40//4 = 10 samples/GPU (no waste); 3 GPU -> 30 samples/step
max_epochs: 500
val_epoch_freq: 2
limit_train_batches: 35       # ~1 pass/epoch: 1062 samples / 30 per step ≈ 35
limit_val_batches: 7          # covers 192 test samples: ceil(192/30) ≈ 7

data:
  train:
    _target_: data.dynamic_dataloader.DynamicTorchDataset
    num_workers: ${num_workers}
    max_img_per_gpu: ${max_img_per_gpu}
    shuffle: True
    pin_memory: False
    common_config:
      fix_img_num: 4
      fix_aspect_ratio: 1.0
      load_track: False
      track_num: 1024
      training: True
      inside_random: True
      img_size: ${img_size}
      patch_size: ${patch_size}
      rescale: False
      rescale_aug: False
      landscape_check: False
      debug: False
      get_nearby: False
      load_depth: False
      img_nums: [4, 4]
      max_img_per_gpu: ${max_img_per_gpu}
      allow_duplicate_img: False
      repeat_batch: False
      augs:
        cojitter: True
        cojitter_ratio: 0.3
        scales: null
        aspects: [1.0, 1.0]
        color_jitter:
          brightness: 0.2
          contrast: 0.2
          saturation: 0.2
          hue: 0.05
          p: 0.5
        gray_scale: False
        gau_blur: False
    dataset:
      _target_: data.composed_dataset.ComposedDataset
      dataset_configs:
        - _target_: data.datasets.mamma_dataset.MammaDataset
          split: train
          MAMMA_DIR: /dataset/Mamma_mv_split/train
          downsampled_verts_path: /dataset/body_models/downsampled_verts/verts_512.pkl
          min_num_views: 4
          person_id: 0
          frame_id: 0
          crop_scale: 1.0
          mamma_crop_width: 384
          mamma_crop_height: 512
          pad_to_square: True
          mask_from_landmarks: True
          num_landmarks: 512
          full_scene: True
          len_train: 100000
  val:
    _target_: data.dynamic_dataloader.DynamicTorchDataset
    num_workers: ${num_workers}
    max_img_per_gpu: ${max_img_per_gpu}
    shuffle: False
    pin_memory: False
    common_config:
      fix_img_num: 4
      fix_aspect_ratio: 1.0
      load_track: False
      track_num: 1024
      training: False
      inside_random: False
      img_size: ${img_size}
      patch_size: ${patch_size}
      rescale: False
      rescale_aug: False
      landscape_check: False
      debug: False
      get_nearby: False
      load_depth: False
      img_nums: [4, 4]
      max_img_per_gpu: ${max_img_per_gpu}
      allow_duplicate_img: False
      repeat_batch: False
      augs:
        cojitter: False
        cojitter_ratio: 0.5
        scales: null
        aspects: [1.0, 1.0]
        color_jitter: null
        gray_scale: False
        gau_blur: False
    dataset:
      _target_: data.composed_dataset.ComposedDataset
      dataset_configs:
        - _target_: data.datasets.mamma_dataset.MammaDataset
          split: test
          MAMMA_DIR: /dataset/Mamma_mv_split/test
          downsampled_verts_path: /dataset/body_models/downsampled_verts/verts_512.pkl
          min_num_views: 4
          person_id: 0
          frame_id: 0
          crop_scale: 1.0
          mamma_crop_width: 384
          mamma_crop_height: 512
          pad_to_square: True
          mask_from_landmarks: True
          num_landmarks: 512
          full_scene: True
          len_test: 10000

# ---- path overrides for the /dataset platform ----
model:
  pretrained_path: /dataset/vggt/model.pt              # VGGT-1B weights (local file)

loss:
  smplx_model_root: /dataset/body_models/smplx_locked_head   # SMPL-X .npz models
