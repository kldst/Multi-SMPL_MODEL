# Base config for the multi-view feed-forward SMPL-X task (VGGT backbone).
# Self-contained (does NOT inherit the VGGT-geometry default.yaml) so there is no
# stray model/loss/logging cruft to merge.  Experiment configs (e.g. mamma_smplx.yaml)
# inherit this and only add data + experiment scalars.

# torchrun --master_port=29200 --nproc_per_node=1 launch.py --config mamma_smplx

exp_name: smplx_exp
img_size: 518
patch_size: 14
num_workers: 8
seed_value: 42
accum_steps: 1
val_epoch_freq: 5
max_img_per_gpu: 4
max_epochs: 20

limit_train_batches: 800
limit_val_batches: 400

# ---------------- model ----------------
model:
  _target_: smplx_pipeline.VGGTSMPLX
  img_size: ${img_size}
  patch_size: ${patch_size}
  embed_dim: 1024
  d_model: 512
  n_landmarks: 512
  num_betas: 16
  num_body_joints: 21
  reg_num_iter: 3             # IEF iterations in the SMPL-X head (1 = single-shot)
  # IEF init pose. null -> auto-use repo smplx_model/smpl_mean_params.npz (mean pose,
  # HMR2/TRAM-style); set to an absolute path on other platforms, or "" to force REST pose.
  reg_mean_params: null
  load_pretrained: True       # load VGGT-1B weights into the encoder
  # Where to get the VGGT-1B weights. Priority: pretrained_path -> HF cache -> HF download.
  # On a new/offline platform, copy model.pt over and set its absolute path here.
  pretrained_path: null       # e.g. /data/weights/vggt/VGGT-1B_model.pt
  pretrained_repo: facebook/VGGT-1B
  pretrained_file: model.pt
  freeze_encoder: True        # Stage A: train heads + camera_head; unfreeze later

# ---------------- loss ----------------
loss:
  _target_: smplx_pipeline.SMPLXMultitaskLoss
  w_smplx: 1.0
  w_landmark: 1.0
  w_vis: 0.1
  w_camera: 1.0
  w_pose: 1.0
  w_beta: 0.1
  w_trans: 1.0
  w_joints3d: 1.0
  w_vertices: 1.0

# ---------------- optim ----------------
optim:
  param_group_modifiers: False
  optimizer:
    _target_: torch.optim.AdamW
    lr: 1.0e-4
    weight_decay: 0.05
  # Trainer-level freeze (kept in sync with model.freeze_encoder); pattern must match.
  frozen_module_names:
    - "*aggregator*"
  amp:
    enabled: True
    amp_dtype: bfloat16
  # GradientClipper requires EVERY parameter to be covered by some group -> single
  # catch-all group (module_name "" is a substring of every parameter name).
  gradient_clip:
    _target_: train_utils.gradient_clip.GradientClipper
    configs:
      - module_name: [""]
        max_norm: 1.0
        norm_type: 2
  options:
    lr:
      - scheduler:
          _target_: fvcore.common.param_scheduler.CompositeParamScheduler
          schedulers:
            - _target_: fvcore.common.param_scheduler.LinearParamScheduler
              start_value: 1.0e-6
              end_value: 1.0e-4
            - _target_: fvcore.common.param_scheduler.CosineParamScheduler
              start_value: 1.0e-4
              end_value: 1.0e-6
          lengths: [0.01, 0.99]
          interval_scaling: ['rescaled', 'rescaled']
    weight_decay:
      - scheduler:
          _target_: fvcore.common.param_scheduler.ConstantParamScheduler
          value: 0.05

# ---------------- logging ----------------
logging:
  log_dir: logs
  log_visuals: False
  log_freq: 1
  log_level_primary: DEBUG
  log_level_secondary: WARNING
  all_ranks: False
  # Logger (key name kept as `tensorboard_writer` because the trainer reads that field;
  # the target is now Weights & Biases). Set mode: offline (or env WANDB_MODE=offline)
  # to run without `wandb login`; use online for the cloud dashboard.
  tensorboard_writer:
    _target_: train_utils.wandb_writer.WandbLogger
    path: ${logging.log_dir}/wandb
    project: vggt_smplx
    name: ${exp_name}
    mode: online
  scalar_keys_to_log:
    train:
      keys_to_log:
        - loss_objective
        - loss_smplx
        - loss_pose
        - loss_beta
        - loss_trans
        - loss_joints3d
        - loss_vertices
        - loss_landmark
        - loss_vis
        - loss_camera
        - lm_px
    val:
      keys_to_log:
        - loss_objective
        - loss_smplx
        - loss_joints3d
        - loss_vertices
        - loss_landmark
        - loss_camera
        - lm_px

# ---------------- checkpoint ----------------
checkpoint:
  save_dir: logs/${exp_name}/ckpts
  save_freq: 5
  resume_checkpoint_path: null   # pretrained VGGT is loaded inside the model
  strict: False

# ---------------- distributed / cuda ----------------
distributed:
  backend: nccl
  comms_dtype: None
  find_unused_parameters: True   # heads/aux may not all receive grad every step
  timeout_mins: 30
  gradient_as_bucket_view: True
  bucket_cap_mb: 25
  broadcast_buffers: True

cuda:
  cudnn_deterministic: False
  cudnn_benchmark: False
  allow_tf32: True
